<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NORDICA // TACTICAL_CANVAS_V4</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

:root {
  --ng: #00ff41;
  --ng2: #00cc33;
  --ng-dim: #003b11;
  --ng-faint: rgba(0,255,65,0.07);
  --bg: #000;
  --panel: #030803;
  --glow: 0 0 12px rgba(0,255,65,0.5);
  --glow-lg: 0 0 30px rgba(0,255,65,0.3);
  --card-bg: rgba(0,8,0,0.95);
  --red: #ff2244;
  --amber: #ffaa00;
  --blue: #00aaff;
  --purple: #aa44ff;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body, html {
  background: var(--bg);
  color: var(--ng);
  font-family: 'Share Tech Mono', monospace;
  height: 100vh; width: 100vw;
  overflow: hidden;
  user-select: none;
}

/* ── TOOLBAR ── */
#toolbar {
  height: 52px;
  display: flex; align-items: center;
  padding: 0 16px; gap: 8px;
  border-bottom: 1px solid var(--ng-dim);
  background: var(--panel);
  position: relative; z-index: 9000;
  box-shadow: 0 2px 20px rgba(0,255,65,0.15);
}

.t-logo {
  font-family: 'Orbitron', monospace;
  font-weight: 900; font-size: 0.85rem;
  letter-spacing: 4px; color: var(--ng);
  text-shadow: var(--glow);
  padding-right: 20px;
  border-right: 1px solid var(--ng-dim);
  white-space: nowrap;
}

.t-group {
  display: flex; gap: 5px;
  padding: 0 12px;
  border-right: 1px solid var(--ng-dim);
}

.t-btn {
  background: transparent; border: 1px solid var(--ng-dim);
  color: var(--ng); padding: 5px 10px; cursor: pointer;
  font-size: 0.65rem; text-transform: uppercase;
  font-family: 'Share Tech Mono', monospace;
  letter-spacing: 1px; transition: all 0.1s;
  white-space: nowrap;
}

.t-btn:hover { border-color: var(--ng); box-shadow: var(--glow); }
.t-btn.active { background: var(--ng); color: #000; box-shadow: var(--glow); }
.t-btn.danger:hover { background: var(--red); border-color: var(--red); color: #fff; box-shadow: 0 0 12px rgba(255,34,68,0.5); }
.t-btn.amber { border-color: var(--amber); color: var(--amber); }
.t-btn.amber:hover { background: var(--amber); color: #000; }
.t-btn.amber.active { background: var(--amber); color: #000; }
.t-btn.blue { border-color: var(--blue); color: var(--blue); }
.t-btn.blue:hover { background: var(--blue); color: #000; }

#search-box {
  background: transparent; border: 1px solid var(--ng-dim);
  color: var(--ng); padding: 5px 10px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem; outline: none;
  width: 160px; transition: all 0.2s;
}
#search-box:focus { border-color: var(--ng); box-shadow: var(--glow); }
#search-box::placeholder { color: var(--ng-dim); }

.t-spacer { flex: 1; }

#zoom-display {
  font-size: 0.6rem; color: var(--ng-dim);
  letter-spacing: 2px; padding-right: 8px;
}

/* ── VIEWPORT ── */
#viewport {
  width: 100vw;
  height: calc(100vh - 52px);
  overflow: hidden;
  cursor: crosshair;
  position: relative;
}

#canvas-world {
  position: absolute;
  transform-origin: 0 0;
  width: 20000px; height: 20000px;
}

/* SVG line layer fills world */
#line-svg {
  position: absolute; top: 0; left: 0;
  width: 20000px; height: 20000px;
  pointer-events: none; z-index: 1;
  overflow: visible;
}

/* ── CARDS ── */
.card {
  position: absolute;
  background: var(--card-bg);
  border: 1px solid var(--ng-dim);
  min-width: 220px;
  display: flex; flex-direction: column;
  transition: border-color 0.15s, box-shadow 0.15s;
  z-index: 100;
  resize: both;
  overflow: hidden;
}
.card:hover { border-color: var(--ng); box-shadow: var(--glow); }
.card.selected { border-color: var(--ng); box-shadow: var(--glow-lg); z-index: 500; }

.card.type-board {
  border: 1px dashed var(--ng);
  background: rgba(0,255,65,0.025);
  min-width: 320px; min-height: 160px;
  resize: both;
}
/* depth tinting for nested boards */
.card.type-board.depth-1 { background: rgba(0,255,65,0.04); border-color: rgba(0,255,65,0.55); }
.card.type-board.depth-2 { background: rgba(0,200,80,0.05); border-color: rgba(0,200,80,0.45); }
.card.type-board.depth-3 { background: rgba(0,170,120,0.05); border-color: rgba(0,170,120,0.4); }
.card.type-board.depth-4 { background: rgba(0,140,160,0.05); border-color: rgba(0,140,160,0.35); }
.card.type-board .board-label { display: none; }
.card.type-board .card-header {
  background: rgba(0,255,65,0.1);
  letter-spacing: 2px;
  font-size: 0.6rem;
}
.board-file-count {
  font-size: 0.55rem; color: var(--ng-dim);
  margin-left: 6px; opacity: 0.7;
}

.card.color-red    { border-color: var(--red)   !important; box-shadow: 0 0 10px rgba(255,34,68,0.3); }
.card.color-amber  { border-color: var(--amber)  !important; box-shadow: 0 0 10px rgba(255,170,0,0.3); }
.card.color-blue   { border-color: var(--blue)   !important; box-shadow: 0 0 10px rgba(0,170,255,0.3); }
.card.color-purple { border-color: var(--purple) !important; box-shadow: 0 0 10px rgba(170,68,255,0.3); }

.card-header {
  padding: 5px 8px;
  font-size: 0.65rem; font-weight: bold;
  cursor: move;
  display: flex; align-items: center; justify-content: space-between;
  gap: 6px;
  background: rgba(0,255,65,0.07);
  border-bottom: 1px solid var(--ng-dim);
  flex-shrink: 0;
}
.card.color-red    .card-header { background: rgba(255,34,68,0.1);    border-color: var(--red);    color: var(--red); }
.card.color-amber  .card-header { background: rgba(255,170,0,0.1);    border-color: var(--amber);  color: var(--amber); }
.card.color-blue   .card-header { background: rgba(0,170,255,0.1);    border-color: var(--blue);   color: var(--blue); }
.card.color-purple .card-header { background: rgba(170,68,255,0.1);   border-color: var(--purple); color: var(--purple); }

.card-title-input {
  background: transparent; border: none; outline: none;
  color: inherit; font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem; font-weight: bold;
  letter-spacing: 1px; flex: 1;
  text-transform: uppercase;
}

.card-actions { display: flex; gap: 4px; flex-shrink: 0; }
.card-action-btn {
  background: transparent; border: none;
  color: inherit; cursor: pointer;
  font-size: 0.7rem; padding: 1px 4px;
  opacity: 0.5; transition: opacity 0.1s;
}
.card-action-btn:hover { opacity: 1; }

.card-body {
  flex: 1;
  overflow: auto;
  min-height: 80px;
  padding: 0;
  display: flex; flex-direction: column;
}

/* Scrollbar */
.card-body::-webkit-scrollbar { width: 4px; }
.card-body::-webkit-scrollbar-track { background: transparent; }
.card-body::-webkit-scrollbar-thumb { background: var(--ng-dim); }

/* Content renderers */
.note-textarea {
  width: 100%; height: 100%; min-height: 80px;
  background: transparent; color: var(--ng);
  border: none; outline: none; resize: none;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.72rem; line-height: 1.6;
  padding: 10px; flex: 1;
}
.note-textarea::selection { background: var(--ng); color: #000; }

.img-preview {
  width: 100%; object-fit: contain;
  display: block; max-height: 300px;
}

.code-block {
  padding: 10px;
  font-size: 0.65rem; line-height: 1.5;
  overflow: auto; flex: 1;
  color: #88ff99;
  white-space: pre-wrap; word-break: break-word;
}

.pdf-embed {
  width: 100%; height: 300px; border: none;
  background: #111;
}

.audio-player, .video-player {
  width: 100%; padding: 10px;
}
.audio-player audio, .video-player video {
  width: 100%; outline: none;
}
audio::-webkit-media-controls-panel { background: #050505; }

.csv-table-wrap { overflow: auto; max-height: 260px; }
table.csv-table {
  border-collapse: collapse;
  font-size: 0.6rem; width: 100%;
}
table.csv-table th {
  background: var(--ng-dim); color: var(--ng);
  padding: 4px 8px; text-align: left;
  position: sticky; top: 0;
}
table.csv-table td {
  padding: 3px 8px; border-bottom: 1px solid #0a1a0a;
  color: #88ff99;
}
table.csv-table tr:hover td { background: rgba(0,255,65,0.04); }

.json-block {
  padding: 10px; font-size: 0.6rem;
  line-height: 1.5; overflow: auto;
  flex: 1; color: #88ff99;
  white-space: pre; max-height: 300px;
}

.board-label {
  text-align: center; padding: 20px;
  font-size: 0.65rem; color: var(--ng-dim);
  letter-spacing: 2px;
}

/* ── COLLAPSED STATE ── */
.card.collapsed .card-body { display: none; }
.card.collapsed .card-footer { display: none; }
.card.collapsed { min-height: 0; resize: none; }

.card-preview {
  padding: 6px 10px 8px;
  font-size: 0.6rem; color: var(--ng-dim);
  display: flex; align-items: center; gap: 8px;
  border-top: 1px solid #0a1a0a;
  cursor: pointer;
  transition: background 0.1s;
  flex-shrink: 0;
}
.card-preview:hover { background: rgba(0,255,65,0.05); color: var(--ng); }
.card-preview .file-icon { font-size: 0.9rem; flex-shrink: 0; }
.card-preview .file-meta { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-preview .expand-hint {
  font-size: 0.55rem; opacity: 0.5; flex-shrink: 0;
  letter-spacing: 1px;
}
/* expand hint now static — fullscreen on click */


.tag-chip {
  display: inline-block;
  border: 1px solid var(--ng-dim);
  padding: 1px 5px; font-size: 0.55rem;
  margin: 1px; cursor: pointer;
}

/* ── LINK CURSOR ── */
body.link-mode { cursor: crosshair; }
body.link-mode .card { cursor: crosshair; }
#link-cursor {
  position: fixed; pointer-events: none;
  font-size: 0.6rem; color: var(--amber);
  z-index: 99999; display: none;
  padding: 3px 6px; background: #0a0800;
  border: 1px solid var(--amber);
}
body.link-mode #link-cursor { display: block; }

/* ── CONTEXT MENU ── */
#ctx-menu {
  position: fixed; z-index: 99999;
  background: var(--panel);
  border: 1px solid var(--ng-dim);
  box-shadow: var(--glow-lg);
  min-width: 170px;
  display: none;
}
#ctx-menu.visible { display: block; }
.ctx-item {
  padding: 7px 14px; font-size: 0.65rem;
  cursor: pointer; letter-spacing: 1px;
  transition: background 0.1s;
  display: flex; align-items: center; gap: 8px;
}
.ctx-item:hover { background: var(--ng-faint); }
.ctx-sep { border-top: 1px solid var(--ng-dim); margin: 3px 0; }
.ctx-label { padding: 4px 14px; font-size: 0.55rem; color: var(--ng-dim); letter-spacing: 2px; }
.ctx-item.red:hover { background: rgba(255,34,68,0.1); color: var(--red); }

/* ── MINIMAP ── */
#minimap {
  position: fixed; bottom: 14px; right: 14px;
  width: 180px; height: 110px;
  background: rgba(3,8,3,0.93);
  border: 1px solid var(--ng-dim);
  z-index: 8000;
  overflow: hidden;
}
#minimap canvas { width: 100%; height: 100%; }
#minimap-label {
  position: absolute; top: 3px; left: 6px;
  font-size: 0.5rem; color: var(--ng-dim); letter-spacing: 2px;
}

/* ── STATUS BAR ── */
#status {
  position: fixed; bottom: 14px; left: 14px;
  font-size: 0.55rem; color: var(--ng-dim);
  letter-spacing: 1px; pointer-events: none;
  line-height: 1.8;
}

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 50px; left: 50%;
  transform: translateX(-50%);
  background: var(--ng); color: #000;
  padding: 6px 18px; font-size: 0.65rem;
  letter-spacing: 2px; z-index: 99998;
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}

/* ── MODAL ── */
#modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 99990; display: none;
  align-items: center; justify-content: center;
}
#modal-overlay.visible { display: flex; }
#modal-box {
  background: var(--panel);
  border: 1px solid var(--ng);
  box-shadow: var(--glow-lg);
  padding: 24px; min-width: 320px;
  font-size: 0.7rem;
}
#modal-box h3 {
  font-family: 'Orbitron', monospace;
  margin-bottom: 14px; font-size: 0.8rem;
  letter-spacing: 2px;
}
#modal-box input, #modal-box select {
  background: transparent; border: 1px solid var(--ng-dim);
  color: var(--ng); padding: 6px 10px; width: 100%;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.7rem; outline: none; margin-bottom: 10px;
}
#modal-box input:focus, #modal-box select:focus { border-color: var(--ng); }
#modal-box select option { background: #050505; }
.modal-row { display: flex; gap: 8px; margin-top: 4px; }
.modal-row button { flex: 1; padding: 8px; font-size: 0.65rem; }

/* ── SELECTION BOX ── */
#sel-box {
  position: absolute;
  border: 1px solid var(--ng);
  background: rgba(0,255,65,0.05);
  pointer-events: none;
  z-index: 9000;
  display: none;
}

/* ── GRID ── */
#viewport {
  background-color: #000;
  background-image:
    linear-gradient(var(--ng-dim) 1px, transparent 1px),
    linear-gradient(90deg, var(--ng-dim) 1px, transparent 1px);
  background-size: 40px 40px;
  background-attachment: local;
}

input[type="file"] { display: none; }

/* ── FULLSCREEN VIEWER ── */
#fs-overlay {
  position: fixed; inset: 0; z-index: 999999;
  background: rgba(0,0,0,0.97);
  display: none; flex-direction: column;
  animation: fsIn 0.18s ease;
}
#fs-overlay.visible { display: flex; }
@keyframes fsIn {
  from { opacity: 0; transform: scale(0.97); }
  to   { opacity: 1; transform: scale(1); }
}

#fs-bar {
  height: 52px; flex-shrink: 0;
  display: flex; align-items: center;
  padding: 0 20px; gap: 16px;
  border-bottom: 1px solid var(--ng-dim);
  background: var(--panel);
}
#fs-title {
  font-family: 'Orbitron', monospace;
  font-size: 0.75rem; letter-spacing: 3px;
  color: var(--ng); flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#fs-type {
  font-size: 0.6rem; color: var(--ng-dim);
  letter-spacing: 2px; padding: 3px 8px;
  border: 1px solid var(--ng-dim);
}
#fs-close {
  background: transparent; border: 1px solid var(--ng-dim);
  color: var(--ng); cursor: pointer;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem; padding: 5px 14px;
  letter-spacing: 2px; transition: all 0.1s;
}
#fs-close:hover { background: var(--red); border-color: var(--red); color: #fff; }

#fs-body {
  flex: 1; overflow: auto;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  position: relative;
}

/* image */
#fs-body img.fs-img {
  max-width: 100%; max-height: 100%;
  object-fit: contain;
  box-shadow: 0 0 60px rgba(0,255,65,0.15);
}

/* PDF */
#fs-body embed.fs-pdf {
  width: 100%; height: 100%;
  border: none;
}

/* video */
#fs-body video.fs-video {
  max-width: 100%; max-height: 100%;
  outline: none;
  box-shadow: 0 0 60px rgba(0,255,65,0.1);
}

/* audio */
#fs-body .fs-audio-wrap {
  display: flex; flex-direction: column;
  align-items: center; gap: 24px;
}
#fs-body .fs-audio-icon { font-size: 5rem; opacity: 0.3; }
#fs-body audio.fs-audio { width: 480px; max-width: 90vw; outline: none; }

/* code / text */
#fs-body .fs-code {
  width: 100%; height: 100%;
  overflow: auto;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.78rem; line-height: 1.7;
  color: #88ff99;
  white-space: pre;
  padding: 8px;
  align-self: flex-start;
}

/* JSON */
#fs-body .fs-json {
  width: 100%; height: 100%;
  overflow: auto;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.78rem; line-height: 1.7;
  white-space: pre;
  padding: 8px;
  align-self: flex-start;
}

/* CSV */
#fs-body .fs-csv-wrap {
  width: 100%; height: 100%;
  overflow: auto; align-self: flex-start;
}
#fs-body table.fs-csv {
  border-collapse: collapse; width: 100%;
  font-size: 0.72rem;
}
#fs-body table.fs-csv th {
  background: var(--ng-dim); color: var(--ng);
  padding: 6px 14px; text-align: left;
  position: sticky; top: 0;
  font-family: 'Orbitron', monospace; font-size: 0.65rem; letter-spacing: 1px;
}
#fs-body table.fs-csv td {
  padding: 5px 14px; border-bottom: 1px solid #0a1a0a; color: #88ff99;
}
#fs-body table.fs-csv tr:hover td { background: rgba(0,255,65,0.04); }

/* markdown */
#fs-body .fs-markdown {
  max-width: 820px; width: 100%;
  font-size: 0.82rem; line-height: 1.9;
  color: #ccffcc; align-self: flex-start;
  padding: 8px 0;
}
#fs-body .fs-markdown h1,h2,h3 { color: var(--ng); font-family: 'Orbitron', monospace; margin: 1em 0 0.4em; }

</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <div class="t-logo">NORDICA</div>

  <div class="t-group">
    <button class="t-btn" onclick="addNodeAt('note')">＋ NOTE</button>
    <button class="t-btn" onclick="addNodeAt('board')">＋ BOARD</button>
  </div>

  <div class="t-group">
    <button class="t-btn amber" id="linkBtn" onclick="toggleLinkMode()">⬡ LINK</button>
    <button class="t-btn danger" onclick="deleteSelected()">✕ DEL</button>
  </div>

  <div class="t-group">
    <button class="t-btn" onclick="document.getElementById('fileInput').click()">⬆ INGEST FILES</button>
    <input type="file" id="fileInput" multiple onchange="handleFiles(event)">
    <button class="t-btn" onclick="document.getElementById('dirInput').click()">⬆ INGEST DIR</button>
    <input type="file" id="dirInput" webkitdirectory multiple onchange="handleFolder(event)">
  </div>

  <div class="t-group">
    <button class="t-btn blue" onclick="exportCanvas()">↓ EXPORT .NDC</button>
    <button class="t-btn blue" onclick="importCanvas()">↑ IMPORT .NDC</button>
  </div>

  <div class="t-group">
    <button class="t-btn" onclick="resetView()">⊕ RESET VIEW</button>
    <button class="t-btn" onclick="autoLayout()">⊞ AUTO LAYOUT</button>
  </div>

  <div class="t-spacer"></div>

  <input type="text" id="search-box" placeholder="SEARCH NODES..." oninput="searchNodes(this.value)">
  <div id="zoom-display">ZOOM: 100%</div>
</div>

<!-- VIEWPORT -->
<div id="viewport" id="viewport">
  <div id="canvas-world">
    <svg id="line-svg"></svg>
    <div id="sel-box"></div>
  </div>
</div>

<!-- STATUS -->
<div id="status">
  NODES: <span id="s-nodes">0</span> &nbsp;|&nbsp;
  LINKS: <span id="s-links">0</span> &nbsp;|&nbsp;
  SEL: <span id="s-sel">0</span>
</div>

<!-- MINIMAP -->
<div id="minimap">
  <span id="minimap-label">MINIMAP</span>
  <canvas id="mm-canvas" width="180" height="110"></canvas>
</div>


<!-- FULLSCREEN VIEWER -->
<div id="fs-overlay">
  <div id="fs-bar">
    <span id="fs-title">FILE</span>
    <span id="fs-type"></span>
    <button id="fs-close" onclick="closeFullscreen()">✕ CLOSE [ESC]</button>
  </div>
  <div id="fs-body"></div>
</div>

<!-- LINK CURSOR -->
<div id="link-cursor">CLICK TARGET NODE</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- CONTEXT MENU -->
<div id="ctx-menu">
  <div class="ctx-label">NODE OPS</div>
  <div class="ctx-item" onclick="ctxAction('color-red')">🔴 MARK RED</div>
  <div class="ctx-item" onclick="ctxAction('color-amber')">🟡 MARK AMBER</div>
  <div class="ctx-item" onclick="ctxAction('color-blue')">🔵 MARK BLUE</div>
  <div class="ctx-item" onclick="ctxAction('color-purple')">🟣 MARK PURPLE</div>
  <div class="ctx-item" onclick="ctxAction('color-none')">⬜ CLEAR COLOR</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxAction('duplicate')">⧉ DUPLICATE</div>
  <div class="ctx-item" onclick="ctxAction('link')">⬡ START LINK</div>
  <div class="ctx-item" onclick="ctxAction('unlink')">✕ REMOVE LINKS</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item red" onclick="ctxAction('delete')">✕ DELETE</div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal-box">
    <h3 id="modal-title">NEW NODE</h3>
    <input type="text" id="modal-name" placeholder="TITLE...">
    <div class="modal-row">
      <button class="t-btn active" onclick="confirmModal()">CONFIRM</button>
      <button class="t-btn" onclick="closeModal()">CANCEL</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const world       = document.getElementById('canvas-world');
const viewport    = document.getElementById('viewport');
const lineSVG     = document.getElementById('line-svg');
const selBox      = document.getElementById('sel-box');
const mmCanvas    = document.getElementById('mm-canvas');
const mmCtx       = mmCanvas.getContext('2d');

let zoom = 1, panX = 4800, panY = 4800; // start centered
let isPanning = false, isSelecting = false;
let selStart = {x:0,y:0};
let linkMode = false, linkSource = null;
let nodes = [];        // {id, x, y, type, title, color, tags}
let connections = [];  // {id, from, to, label, color}
let selectedIds = new Set();
let ctxTargetId = null;
const fileStore = {}; // nid → { fileType, fileData, content }
let pendingNodeType = null;

const WORLD_W = 20000, WORLD_H = 20000;

// ═══════════════════════════════════════════════
// TRANSFORM
// ═══════════════════════════════════════════════
function applyTransform() {
  world.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
  document.getElementById('zoom-display').textContent = `ZOOM: ${Math.round(zoom*100)}%`;
  updateGridBackground();
}

function updateGridBackground() {
  const sz = 40 * zoom;
  const ox = panX % sz;
  const oy = panY % sz;
  viewport.style.backgroundSize = `${sz}px ${sz}px`;
  viewport.style.backgroundPosition = `${ox}px ${oy}px`;
}

function screenToWorld(sx, sy) {
  const r = viewport.getBoundingClientRect();
  return {
    x: (sx - r.left - panX) / zoom,
    y: (sy - r.top  - panY) / zoom
  };
}

function worldToScreen(wx, wy) {
  const r = viewport.getBoundingClientRect();
  return {
    x: wx * zoom + panX + r.left,
    y: wy * zoom + panY + r.top
  };
}

// ═══════════════════════════════════════════════
// PANNING + ZOOMING
// ═══════════════════════════════════════════════
let panStart = null;

viewport.addEventListener('mousedown', e => {
  if (e.button === 1 || (e.button === 0 && e.altKey)) {
    // Middle click or Alt+drag = pan
    isPanning = true;
    panStart = {x: e.clientX - panX, y: e.clientY - panY};
    viewport.style.cursor = 'grabbing';
    e.preventDefault();
  } else if (e.button === 0 && e.target === viewport || e.target === world || e.target === lineSVG) {
    if (linkMode) return;
    // box select
    isSelecting = true;
    const wp = screenToWorld(e.clientX, e.clientY);
    selStart = wp;
    selBox.style.display = 'block';
    selBox.style.left   = wp.x + 'px';
    selBox.style.top    = wp.y + 'px';
    selBox.style.width  = '0px';
    selBox.style.height = '0px';
    if (!e.shiftKey) clearSelection();
  }
});

window.addEventListener('mousemove', e => {
  if (isPanning) {
    panX = e.clientX - panStart.x;
    panY = e.clientY - panStart.y;
    applyTransform();
    drawMinimap();
  }

  if (isSelecting) {
    const wp = screenToWorld(e.clientX, e.clientY);
    const rx = Math.min(wp.x, selStart.x);
    const ry = Math.min(wp.y, selStart.y);
    const rw = Math.abs(wp.x - selStart.x);
    const rh = Math.abs(wp.y - selStart.y);
    selBox.style.left   = rx + 'px';
    selBox.style.top    = ry + 'px';
    selBox.style.width  = rw + 'px';
    selBox.style.height = rh + 'px';
  }

  if (linkMode) {
    const lc = document.getElementById('link-cursor');
    lc.style.left = (e.clientX + 14) + 'px';
    lc.style.top  = (e.clientY + 14) + 'px';
  }
});

window.addEventListener('mouseup', e => {
  if (isPanning) { isPanning = false; viewport.style.cursor = 'crosshair'; }
  if (isSelecting) {
    isSelecting = false;
    selBox.style.display = 'none';
    // find nodes inside selection box
    const bx = parseFloat(selBox.style.left);
    const by = parseFloat(selBox.style.top);
    const bw = parseFloat(selBox.style.width);
    const bh = parseFloat(selBox.style.height);
    if (bw > 5 && bh > 5) {
      nodes.forEach(n => {
        const el = document.getElementById(n.id);
        if (!el) return;
        const ex = parseFloat(el.style.left);
        const ey = parseFloat(el.style.top);
        if (ex >= bx && ey >= by && ex <= bx+bw && ey <= by+bh) {
          selectedIds.add(n.id);
          el.classList.add('selected');
        }
      });
      updateStatus();
    }
  }
});

viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.909;
  const r = viewport.getBoundingClientRect();
  const mx = e.clientX - r.left;
  const my = e.clientY - r.top;
  // zoom toward cursor
  panX = mx - (mx - panX) * factor;
  panY = my - (my - panY) * factor;
  zoom = Math.max(0.08, Math.min(4, zoom * factor));
  applyTransform();
  drawMinimap();
}, { passive: false });

// Keyboard shortcuts
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
  if (e.key === 'Escape') { cancelLink(); clearSelection(); hideCtxMenu(); closeModal(); closeFullscreen(); }
  if (e.key === 'l' || e.key === 'L') toggleLinkMode();
  if (e.key === 'n' || e.key === 'N') addNodeAt('note');
  if (e.key === 'b' || e.key === 'B') addNodeAt('board');
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); exportCanvas(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'a') { e.preventDefault(); selectAll(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'd') { e.preventDefault(); duplicateSelected(); }
});

function resetView() {
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  zoom = 1; panX = vw/2 - 500; panY = vh/2 - 300;
  applyTransform(); drawMinimap();
}

// ═══════════════════════════════════════════════
// NODE CREATION
// ═══════════════════════════════════════════════
function centerPos() {
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  return screenToWorld(vw/2 + Math.random()*80-40, vh/2 + Math.random()*80-40);
}

function addNodeAt(type) {
  const p = centerPos();
  openModal(type === 'board' ? 'NEW BOARD' : 'NEW NOTE', '', name => {
    createNode({type, title: name || (type==='board'?'BOARD':'NOTE'), x: p.x, y: p.y, content:''});
  });
}

let _modalCb = null;
function openModal(title, def, cb) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-name').value = def || '';
  _modalCb = cb;
  document.getElementById('modal-overlay').classList.add('visible');
  setTimeout(() => document.getElementById('modal-name').focus(), 50);
}
function confirmModal() {
  const val = document.getElementById('modal-name').value.trim();
  closeModal();
  if (_modalCb) _modalCb(val);
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('visible');
  _modalCb = null;
}
document.getElementById('modal-name').addEventListener('keydown', e => { if(e.key==='Enter') confirmModal(); });

function fileIcon(ft) {
  if (!ft) return '📄';
  const f = ft.toLowerCase();
  if (f.match(/^image\//))      return '🖼';
  if (f === 'application/pdf')  return '📕';
  if (f.match(/^audio\//))      return '🎵';
  if (f.match(/^video\//))      return '🎬';
  if (f === 'text/csv' || f === 'text/tab-separated-values') return '📊';
  if (f.match(/json/))          return '{ }';
  if (f.match(/html/))          return '🌐';
  if (f.match(/markdown/))      return '✍';
  if (f.match(/python/))        return '🐍';
  if (f.match(/javascript|typescript/)) return 'JS';
  if (f.match(/css/))           return '🎨';
  if (f.match(/yaml/))          return '⚙';
  if (f.match(/xml/))           return '◇';
  return '📄';
}

function isFileNode(fileType) {
  // File nodes start collapsed; plain notes do not
  return !!fileType;
}

function createNode({type='note', title='NODE', content='', x=100, y=100, id=null, color=null, fileType=null, fileData=null}) {
  const nid = id || ('n' + Date.now() + Math.floor(Math.random()*9999));
  const startCollapsed = isFileNode(fileType);

  const el = document.createElement('div');
  el.className = 'card type-' + type + (color ? ' color-' + color : '') + (startCollapsed ? ' collapsed' : '');
  el.id = nid;
  el.style.left = x + 'px';
  el.style.top  = y + 'px';

  const icon = fileIcon(fileType);
  // Store file data for fullscreen viewer
  if (fileType) {
    fileStore[nid] = { fileType, fileData: fileData || null, content: content || '' };
  }

  // previewBar is now built inline in el.innerHTML below

  // Build shell without body content (avoids backtick injection from file content)
  el.innerHTML =
    '<div class="card-header" id="hdr-' + nid + '">' +
      '<input class="card-title-input" id="ti-' + nid + '"' +
             ' onchange="updateNodeTitle(\'' + nid + '\', this.value)"' +
             ' onmousedown="event.stopPropagation()">' +
      '<div class="card-actions">' +
        (fileType ? '<button class="card-action-btn" onclick="openFullscreen(\'' + nid + '\')" title="View Fullscreen">▣</button>' : '') +
        '<button class="card-action-btn" onclick="initLink(\'' + nid + '\')" title="Link">⬡</button>' +
        '<button class="card-action-btn" onclick="deleteNode(\'' + nid + '\')" title="Delete">✕</button>' +
      '</div>' +
    '</div>' +
    (fileType ?
      '<div class="card-preview" onclick="openFullscreen(\'' + nid + '\')" onmousedown="event.stopPropagation()">' +
        '<span class="file-icon">' + icon + '</span>' +
        '<span class="file-meta">' + escHtml(fileType.split('/').pop().toUpperCase()) + '</span>' +
        '<span class="expand-hint" style="font-size:0.55rem;opacity:0.5;letter-spacing:1px">▣ VIEW</span>' +
      '</div>' : '') +
    '<div class="card-body" id="body-' + nid + '"></div>' +
    '<div class="card-footer">' +
      '<span id="tags-' + nid + '"></span>' +
      '<span>' + escHtml(fileType || type) + '</span>' +
    '</div>';

  // Set title value safely (avoids HTML injection via title string)
  const titleInput = el.querySelector('#ti-' + nid);
  if (titleInput) titleInput.value = title;

  // Populate body separately so file content never touches innerHTML template
  const bodyEl = el.querySelector('#body-' + nid);
  if (bodyEl) {
    bodyEl.innerHTML = renderBody(type, content, fileType, fileData, nid);
    // Set textarea value safely via property (not innerHTML) to avoid </textarea> injection
    const ta = bodyEl.querySelector('textarea');
    if (ta) ta.value = content || '';
  }

  // Header drag
  const hdr = el.querySelector('.card-header');
  hdr.addEventListener('mousedown', e => startDrag(e, nid));

  // Card click select
  el.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    if (linkMode) {
      if (linkSource && linkSource !== nid) {
        finishLink(nid);
      }
      e.stopPropagation();
      return;
    }
    if (!e.shiftKey) {
      if (!selectedIds.has(nid)) clearSelection();
    }
    selectedIds.add(nid);
    el.classList.add('selected');
    updateStatus();
    e.stopPropagation();
  });

  // Context menu
  el.addEventListener('contextmenu', e => {
    e.preventDefault();
    ctxTargetId = nid;
    showCtxMenu(e.clientX, e.clientY);
  });

  world.appendChild(el);
  nodes.push({id:nid, type, title, color, x, y});
  updateStatus();
  drawLinks();
  drawMinimap();
  return nid;
}

function renderBody(type, content, fileType, fileData, nid) {
  if (type === 'board') return `<div class="board-label">[ SUB-BOARD // DROP NODES HERE ]</div>`;

  if (fileType) {
    const ft = fileType.toLowerCase();
    if (ft.match(/^image\//)) {
      return `<img class="img-preview" src="${fileData}" alt="image">`;
    }
    if (ft === 'application/pdf') {
      return `<embed class="pdf-embed" src="${fileData}" type="application/pdf">`;
    }
    if (ft.match(/^audio\//)) {
      return `<div class="audio-player"><audio controls><source src="${fileData}" type="${fileType}"></audio></div>`;
    }
    if (ft.match(/^video\//)) {
      return `<div class="video-player"><video controls><source src="${fileData}" type="${fileType}"></video></div>`;
    }
    if (ft === 'text/csv' || ft === 'text/tab-separated-values' || content.includes(',') && content.split('\n')[0].split(',').length > 2) {
      return renderCSV(content);
    }
    if (ft === 'application/json' || ft === 'text/json') {
      try {
        const pretty = JSON.stringify(JSON.parse(content), null, 2);
        return `<div class="json-block">${syntaxHighlightJSON(pretty)}</div>`;
      } catch(e) {}
    }
    if (isCodeType(ft, content)) {
      return `<div class="code-block">${escHtml(content)}</div>`;
    }
  }

  // Return a placeholder; caller sets textarea value via textContent to avoid injection
  return '<textarea class="note-textarea" onmousedown="event.stopPropagation()"></textarea>';
}

function isCodeType(ft, content) {
  return ft.match(/javascript|typescript|python|css|html|xml|yaml|json|markdown|shell|bash|ruby|go|rust|c\+\+|java/) ||
    content.length > 0;
}

function renderCSV(text) {
  const rows = text.trim().split('\n').map(r => r.split(','));
  if (!rows.length) return '<div class="code-block">EMPTY</div>';
  const hdr = rows[0];
  const body = rows.slice(1, 50); // cap at 50 rows
  return `<div class="csv-table-wrap"><table class="csv-table">
    <thead><tr>${hdr.map(h=>`<th>${escHtml(h.trim())}</th>`).join('')}</tr></thead>
    <tbody>${body.map(r=>`<tr>${r.map(c=>`<td>${escHtml((c||'').trim())}</td>`).join('')}</tr>`).join('')}</tbody>
  </table></div>`;
}

function syntaxHighlightJSON(str) {
  return escHtml(str)
    .replace(/"([^"]+)":/g, '<span style="color:#00ff88">"$1"</span>:')
    .replace(/: "([^"]*)"/g, ': <span style="color:#88ffaa">"$1"</span>')
    .replace(/: (\d+\.?\d*)/g, ': <span style="color:#ffaa44">$1</span>')
    .replace(/: (true|false|null)/g, ': <span style="color:#ff8844">$1</span>');
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════
// FILE INGESTION
// ═══════════════════════════════════════════════
function handleFiles(e) {
  const files = Array.from(e.target.files);
  const p = centerPos();
  files.forEach((file, i) => {
    const x = p.x + (i % 5) * 280;
    const y = p.y + Math.floor(i / 5) * 220;
    ingestFile(file, x, y, null);
  });
  e.target.value = '';
}

function handleFolder(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;

  // ── Build full nested tree ──
  // tree node: { name, files: [File], children: {name: treeNode} }
  const root = { name: '', files: [], children: {} };

  files.forEach(f => {
    const parts = f.webkitRelativePath.split('/');
    let node = root;
    // Walk every path segment; last segment is the filename
    for (let i = 0; i < parts.length - 1; i++) {
      const seg = parts[i];
      if (!node.children[seg]) node.children[seg] = { name: seg, files: [], children: {} };
      node = node.children[seg];
    }
    node.files.push(f);
  });

  // ── Layout constants ──
  const CARD_W = 240, CARD_H = 52;  // collapsed file card
  const COLS   = 4;
  const PAD    = 28;   // padding inside board
  const GAP_X  = 16;   // gap between columns
  const GAP_Y  = 12;   // gap between rows
  const HDR_H  = 52;   // board header height
  const BOARD_SEP_X = 40;
  const BOARD_SEP_Y = 40;

  // ── Recursively measure & place a tree node ──
  // Returns { id, w, h } after placing everything at (ox, oy)
  function placeNode(treeNode, ox, oy, parentBoardId, depth=1) {
    // 1. create board for this folder
    const boardId = createNode({
      type: 'board',
      title: treeNode.name.toUpperCase() || 'ROOT',
      x: ox, y: oy
    });
    // Apply depth class for visual nesting
    const depthClass = 'depth-' + Math.min(depth, 4);
    const boardEl0 = document.getElementById(boardId);
    if (boardEl0) boardEl0.classList.add(depthClass);
    if (parentBoardId) {
      connections.push({ id: 'c' + Date.now() + Math.random(), from: parentBoardId, to: boardId });
    }

    let cursor_x = ox + PAD;
    let cursor_y = oy + HDR_H + PAD;
    let row_max_h = 0;
    let col = 0;
    let contentRight = cursor_x;
    let contentBottom = cursor_y;

    // 2. Place direct files first
    const pendingFiles = [...treeNode.files];
    const filePromises = [];

    pendingFiles.forEach((file, i) => {
      const fx = cursor_x + col * (CARD_W + GAP_X);
      const fy = cursor_y;
      col++;
      if (col >= COLS) { col = 0; cursor_y += CARD_H + GAP_Y; }
      contentRight  = Math.max(contentRight,  fx + CARD_W);
      contentBottom = Math.max(contentBottom, fy + CARD_H);

      const isBinary = file.type.match(/^image\/|^audio\/|^video\/|application\/pdf/);
      const p = new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = ev => {
          const nid = createNode({
            type: 'note', title: file.name,
            content: isBinary ? '' : ev.target.result,
            fileType: file.type || guessMime(file.name),
            fileData: isBinary ? ev.target.result : null,
            x: fx, y: fy
          });
          connections.push({ id: 'c' + Date.now() + Math.random(), from: boardId, to: nid });
          resolve();
        };
        if (isBinary) reader.readAsDataURL(file);
        else reader.readAsText(file);
      });
      filePromises.push(p);
    });

    // 3. After files, advance cursor to next row
    if (pendingFiles.length) {
      if (col > 0) cursor_y += CARD_H + GAP_Y;
      col = 0;
      cursor_y += GAP_Y;
    }

    // 4. Place sub-boards recursively side-by-side
    const subKeys = Object.keys(treeNode.children);
    let subX = ox + PAD;
    let subRowBottom = cursor_y;

    subKeys.forEach(key => {
      const child = treeNode.children[key];
      // Placeholder size — we measure after creation
      const { w: sw, h: sh } = placeNode(child, subX, cursor_y, boardId, depth + 1);
      contentRight  = Math.max(contentRight,  subX + sw);
      contentBottom = Math.max(contentBottom, cursor_y + sh);
      subRowBottom  = Math.max(subRowBottom,  cursor_y + sh);
      subX += sw + BOARD_SEP_X;
    });
    if (subKeys.length) cursor_y = subRowBottom + BOARD_SEP_Y;

    // 5. Resize this board to contain everything
    const boardW = Math.max(380, contentRight - ox + PAD);
    const boardH = Math.max(160, contentBottom - oy + PAD);
    const boardEl = document.getElementById(boardId);
    if (boardEl) {
      boardEl.style.width  = boardW + 'px';
      boardEl.style.height = boardH + 'px';
      // Show file + subfolder count in header
      const totalFiles = pendingFiles.length;
      const totalFolders = subKeys.length;
      const titleInput = boardEl.querySelector('.card-title-input');
      if (titleInput) {
        const existing = boardEl.querySelector('.board-file-count');
        if (existing) existing.remove();
        const badge = document.createElement('span');
        badge.className = 'board-file-count';
        const parts = [];
        if (totalFiles)   parts.push(totalFiles + ' file' + (totalFiles !== 1 ? 's' : ''));
        if (totalFolders) parts.push(totalFolders + ' folder' + (totalFolders !== 1 ? 's' : ''));
        badge.textContent = parts.join(', ');
        titleInput.parentNode.insertBefore(badge, titleInput.nextSibling);
      }
    }

    Promise.all(filePromises).then(() => { drawLinks(); drawMinimap(); });
    return { id: boardId, w: boardW, h: boardH };
  }

  // ── Kick off from root's children (skip the root itself if it's just a wrapper) ──
  const p = centerPos();
  const topKeys = Object.keys(root.children);
  let ox = p.x;
  topKeys.forEach(key => {
    const { w } = placeNode(root.children[key], ox, p.y, null);
    ox += w + BOARD_SEP_X * 2;
  });

  drawLinks(); drawMinimap();
  e.target.value = '';
}

function ingestFile(file, x, y, parentId) {
  const isBinary = file.type.match(/^image\/|^audio\/|^video\/|application\/pdf/);
  if (isBinary) {
    const reader = new FileReader();
    reader.onload = ev => {
      const nid = createNode({
        type:'note', title: file.name,
        content:'', fileType: file.type,
        fileData: ev.target.result, x, y
      });
      if (parentId) { connections.push({id:'c'+Date.now()+Math.random(), from: parentId, to: nid}); drawLinks(); }
    };
    reader.readAsDataURL(file);
  } else {
    const reader = new FileReader();
    reader.onload = ev => {
      const nid = createNode({
        type:'note', title: file.name,
        content: ev.target.result,
        fileType: file.type || guessMime(file.name), x, y
      });
      if (parentId) { connections.push({id:'c'+Date.now()+Math.random(), from: parentId, to: nid}); drawLinks(); }
    };
    reader.readAsText(file);
  }
}

function guessMime(name) {
  const ext = name.split('.').pop().toLowerCase();
  return {
    js:'text/javascript', ts:'text/typescript', py:'text/python',
    json:'application/json', csv:'text/csv', md:'text/markdown',
    html:'text/html', css:'text/css', sh:'text/x-sh',
    yaml:'text/yaml', yml:'text/yaml', xml:'text/xml',
    txt:'text/plain', rs:'text/rust', go:'text/go',
    cpp:'text/c++', c:'text/c', java:'text/java', rb:'text/ruby'
  }[ext] || 'text/plain';
}

// ═══════════════════════════════════════════════
// DRAGGING (zoom-corrected)
// ═══════════════════════════════════════════════
let dragState = null;

function startDrag(e, id) {
  if (e.button !== 0) return;
  e.stopPropagation(); e.preventDefault();
  const el = document.getElementById(id);
  el.style.zIndex = 1000;

  // Collect all selected nodes' initial positions
  const targets = selectedIds.has(id) ? [...selectedIds] : [id];
  if (!selectedIds.has(id)) { clearSelection(); selectedIds.add(id); el.classList.add('selected'); }

  const startPositions = {};
  targets.forEach(tid => {
    const te = document.getElementById(tid);
    if (te) startPositions[tid] = { x: parseFloat(te.style.left)||0, y: parseFloat(te.style.top)||0 };
  });

  dragState = {
    ids: targets,
    startMouse: { x: e.clientX, y: e.clientY },
    startPositions
  };

  window.addEventListener('mousemove', onDragMove);
  window.addEventListener('mouseup', onDragEnd);
}

function onDragMove(e) {
  if (!dragState) return;
  const dx = (e.clientX - dragState.startMouse.x) / zoom;
  const dy = (e.clientY - dragState.startMouse.y) / zoom;
  dragState.ids.forEach(tid => {
    const te = document.getElementById(tid);
    if (!te) return;
    const sp = dragState.startPositions[tid];
    te.style.left = (sp.x + dx) + 'px';
    te.style.top  = (sp.y + dy) + 'px';
    // update node record
    const nd = nodes.find(n => n.id === tid);
    if (nd) { nd.x = sp.x + dx; nd.y = sp.y + dy; }
  });
  drawLinks(); drawMinimap();
}

function onDragEnd() {
  if (dragState) {
    dragState.ids.forEach(tid => {
      const te = document.getElementById(tid);
      if (te) te.style.zIndex = selectedIds.has(tid) ? 500 : 100;
    });
    dragState = null;
  }
  window.removeEventListener('mousemove', onDragMove);
  window.removeEventListener('mouseup', onDragEnd);
}

// ═══════════════════════════════════════════════
// LINKING
// ═══════════════════════════════════════════════
function toggleLinkMode() {
  linkMode = !linkMode;
  document.getElementById('linkBtn').classList.toggle('active', linkMode);
  document.body.classList.toggle('link-mode', linkMode);
  if (!linkMode) cancelLink();
}

function initLink(id) {
  if (!linkMode) toggleLinkMode();
  linkSource = id;
  toast('SELECT TARGET NODE // ESC TO CANCEL');
}

function finishLink(targetId) {
  if (!linkSource || linkSource === targetId) return cancelLink();
  // Prevent duplicate
  const exists = connections.some(c =>
    (c.from === linkSource && c.to === targetId) ||
    (c.from === targetId   && c.to === linkSource));
  if (!exists) {
    connections.push({id:'c'+Date.now(), from: linkSource, to: targetId, color: null});
    updateStatus(); drawLinks(); toast('LINK ESTABLISHED');
  }
  linkSource = null;
  toggleLinkMode();
}

function cancelLink() {
  linkSource = null;
  linkMode = false;
  document.getElementById('linkBtn').classList.remove('active');
  document.body.classList.remove('link-mode');
}

// Click on empty world in link mode — cancel
world.addEventListener('click', e => {
  if (!linkMode) return;
  if (e.target === world || e.target === viewport || e.target === lineSVG) cancelLink();
});

// ═══════════════════════════════════════════════
// DRAW LINKS (SVG)
// ═══════════════════════════════════════════════
function getNodeCenter(id) {
  const el = document.getElementById(id);
  if (!el) return null;
  return {
    x: parseFloat(el.style.left) + el.offsetWidth / 2,
    y: parseFloat(el.style.top)  + el.offsetHeight / 2
  };
}

function drawLinks() {
  lineSVG.innerHTML = '';

  // Defs for arrowhead
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  const mkMarker = (id, color) => {
    const m = document.createElementNS('http://www.w3.org/2000/svg','marker');
    m.setAttribute('id', id);
    m.setAttribute('markerWidth','8'); m.setAttribute('markerHeight','8');
    m.setAttribute('refX','6'); m.setAttribute('refY','3');
    m.setAttribute('orient','auto');
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d','M0,0 L0,6 L8,3 z');
    p.setAttribute('fill', color);
    m.appendChild(p); return m;
  };
  defs.appendChild(mkMarker('arrow-ng',    '#00ff41'));
  defs.appendChild(mkMarker('arrow-red',   '#ff2244'));
  defs.appendChild(mkMarker('arrow-amber', '#ffaa00'));
  defs.appendChild(mkMarker('arrow-blue',  '#00aaff'));
  lineSVG.appendChild(defs);

  connections.forEach(c => {
    const a = getNodeCenter(c.from);
    const b = getNodeCenter(c.to);
    if (!a || !b) return;

    const color = c.color || '#00ff41';
    const arrowId = color === '#ff2244' ? 'arrow-red' :
                    color === '#ffaa00' ? 'arrow-amber' :
                    color === '#00aaff' ? 'arrow-blue' : 'arrow-ng';

    // Cubic bezier
    const dx = b.x - a.x, dy = b.y - a.y;
    const cp1x = a.x + dx * 0.4, cp1y = a.y;
    const cp2x = b.x - dx * 0.4, cp2y = b.y;

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M${a.x},${a.y} C${cp1x},${cp1y} ${cp2x},${cp2y} ${b.x},${b.y}`);
    path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke-dasharray', '6,4');
    path.setAttribute('marker-end', `url(#${arrowId})`);
    path.setAttribute('opacity', '0.8');
    path.dataset.cid = c.id;
    path.style.cursor = 'pointer';

    // Click link to delete
    path.addEventListener('click', () => {
      connections = connections.filter(x => x.id !== c.id);
      updateStatus(); drawLinks();
    });
    lineSVG.appendChild(path);
  });
}

// ═══════════════════════════════════════════════
// SELECTION + DELETION
// ═══════════════════════════════════════════════
function clearSelection() {
  selectedIds.forEach(id => document.getElementById(id)?.classList.remove('selected'));
  selectedIds.clear();
  updateStatus();
}

function selectAll() {
  nodes.forEach(n => {
    selectedIds.add(n.id);
    document.getElementById(n.id)?.classList.add('selected');
  });
  updateStatus();
}

function deleteNode(id) {
  document.getElementById(id)?.remove();
  nodes = nodes.filter(n => n.id !== id);
  connections = connections.filter(c => c.from !== id && c.to !== id);
  selectedIds.delete(id);
  delete fileStore[id];
  updateStatus(); drawLinks(); drawMinimap();
}

function deleteSelected() {
  [...selectedIds].forEach(id => deleteNode(id));
  clearSelection();
}

function duplicateSelected() {
  const newIds = [];
  [...selectedIds].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const nd = nodes.find(n => n.id === id);
    if (!nd) return;
    const nid = createNode({...nd, id: null, x: nd.x + 30, y: nd.y + 30});
    newIds.push(nid);
  });
  clearSelection();
  newIds.forEach(id => { selectedIds.add(id); document.getElementById(id)?.classList.add('selected'); });
  updateStatus();
}

function updateNodeTitle(id, val) {
  const nd = nodes.find(n => n.id === id);
  if (nd) nd.title = val;
}

function toggleCollapse(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const isCollapsed = el.classList.toggle('collapsed');
  const btn = el.querySelector('.card-action-btn[title="Expand/Collapse"]');
  if (btn) btn.textContent = isCollapsed ? '▼' : '▲';
  drawLinks();
  drawMinimap();
}

// ═══════════════════════════════════════════════
// CONTEXT MENU
// ═══════════════════════════════════════════════
function showCtxMenu(x, y) {
  const m = document.getElementById('ctx-menu');
  m.style.left = x + 'px'; m.style.top = y + 'px';
  m.classList.add('visible');
}
function hideCtxMenu() { document.getElementById('ctx-menu').classList.remove('visible'); }
window.addEventListener('click', hideCtxMenu);
window.addEventListener('contextmenu', e => { if (!e.target.closest('.card')) hideCtxMenu(); });

function ctxAction(action) {
  hideCtxMenu();
  if (!ctxTargetId) return;
  const el = document.getElementById(ctxTargetId);
  const nd = nodes.find(n => n.id === ctxTargetId);
  if (!el || !nd) return;

  if (action.startsWith('color-')) {
    const color = action.replace('color-', '');
    el.className = el.className.replace(/\bcolor-\w+/g, '').trim();
    if (color !== 'none') { el.classList.add('color-' + color); nd.color = color; }
    else nd.color = null;
  }
  if (action === 'duplicate') {
    createNode({...nd, id: null, x: nd.x + 40, y: nd.y + 40});
  }
  if (action === 'link') initLink(ctxTargetId);
  if (action === 'unlink') {
    connections = connections.filter(c => c.from !== ctxTargetId && c.to !== ctxTargetId);
    updateStatus(); drawLinks();
  }
  if (action === 'delete') deleteNode(ctxTargetId);
  ctxTargetId = null;
}

// ═══════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════
function searchNodes(q) {
  q = q.toLowerCase().trim();
  nodes.forEach(n => {
    const el = document.getElementById(n.id);
    if (!el) return;
    if (!q) { el.style.opacity = '1'; return; }
    const match = n.title.toLowerCase().includes(q);
    el.style.opacity = match ? '1' : '0.15';
  });
}

// ═══════════════════════════════════════════════
// FULLSCREEN VIEWER
// ═══════════════════════════════════════════════
function openFullscreen(nid) {
  const nd = nodes.find(n => n.id === nid);
  const store = fileStore[nid];
  if (!store && nd?.type !== 'note') return;

  const title = nd ? nd.title : 'FILE';
  const { fileType, fileData, content } = store || { fileType: 'text/plain', fileData: null, content: '' };

  document.getElementById('fs-title').textContent = title.toUpperCase();
  document.getElementById('fs-type').textContent  = fileType ? fileType.toUpperCase() : 'TEXT';

  const body = document.getElementById('fs-body');
  body.innerHTML = '';

  const ft = (fileType || '').toLowerCase();

  if (ft.match(/^image\//)) {
    const img = document.createElement('img');
    img.className = 'fs-img';
    img.src = fileData;
    img.alt = title;
    body.appendChild(img);

  } else if (ft === 'application/pdf') {
    const em = document.createElement('embed');
    em.className = 'fs-pdf';
    em.src = fileData;
    em.type = 'application/pdf';
    body.appendChild(em);

  } else if (ft.match(/^video\//)) {
    const vid = document.createElement('video');
    vid.className = 'fs-video';
    vid.controls = true;
    vid.autoplay = false;
    const src = document.createElement('source');
    src.src = fileData; src.type = fileType;
    vid.appendChild(src);
    body.appendChild(vid);

  } else if (ft.match(/^audio\//)) {
    const wrap = document.createElement('div');
    wrap.className = 'fs-audio-wrap';
    wrap.innerHTML = `<div class="fs-audio-icon">🎵</div>
      <div style="font-family:'Orbitron',monospace;font-size:0.7rem;letter-spacing:2px;color:var(--ng-dim);margin-bottom:8px">${escHtml(title)}</div>
      <audio class="fs-audio" controls><source src="${fileData}" type="${escHtml(fileType)}"></audio>`;
    body.appendChild(wrap);

  } else if (ft === 'text/csv' || ft === 'text/tab-separated-values') {
    body.style.alignItems = 'flex-start';
    body.innerHTML = '<div class="fs-csv-wrap">' + buildFsCSV(content) + '</div>';

  } else if (ft.match(/json/)) {
    try {
      const pretty = JSON.stringify(JSON.parse(content), null, 2);
      const div = document.createElement('div');
      div.className = 'fs-json';
      div.innerHTML = syntaxHighlightJSON(pretty);
      body.appendChild(div);
    } catch(e) {
      const div = document.createElement('div');
      div.className = 'fs-code';
      div.textContent = content;
      body.appendChild(div);
    }

  } else if (ft.match(/markdown/)) {
    const div = document.createElement('div');
    div.className = 'fs-markdown';
    div.innerHTML = simpleMarkdown(content);
    body.appendChild(div);

  } else {
    // Code / plain text
    const div = document.createElement('div');
    div.className = 'fs-code';
    div.textContent = content;
    body.appendChild(div);
  }

  document.getElementById('fs-overlay').classList.add('visible');
  document.body.style.overflow = 'hidden';
}

function closeFullscreen() {
  document.getElementById('fs-overlay').classList.remove('visible');
  document.body.style.overflow = '';
  // Pause any media
  document.querySelectorAll('#fs-body video, #fs-body audio').forEach(m => m.pause());
  document.getElementById('fs-body').innerHTML = '';
}

function buildFsCSV(text) {
  const rows = text.trim().split('\n').map(r => r.split(','));
  if (!rows.length) return '<div class="fs-code">EMPTY</div>';
  const hdr = rows[0];
  const body = rows.slice(1);
  return `<table class="fs-csv">
    <thead><tr>${hdr.map(h=>`<th>${escHtml(h.trim())}</th>`).join('')}</tr></thead>
    <tbody>${body.map(r=>`<tr>${r.map(c=>`<td>${escHtml((c||'').trim())}</td>`).join('')}</tr>`).join('')}</tbody>
  </table>`;
}

function simpleMarkdown(text) {
  return escHtml(text)
    .replace(/^# (.+)$/gm,   '<h1>$1</h1>')
    .replace(/^## (.+)$/gm,  '<h2>$1</h2>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,   '<em>$1</em>')
    .replace(/`([^`]+)`/g,   '<code style="background:#0a1a0a;padding:1px 5px;color:#00ff88">$1</code>')
    .replace(/\n/g, '<br>');
}

// ═══════════════════════════════════════════════
// AUTO LAYOUT — PYRAMID + COLLISION RESOLUTION
// ═══════════════════════════════════════════════
function autoLayout() {
  if (!nodes.length) return;

  const GAP_X = 40;   // horizontal gap between cards
  const GAP_Y = 80;   // vertical gap between levels

  // ── 1. Get real card dimensions ──
  function cardSize(id) {
    const el = document.getElementById(id);
    if (!el) return { w: 240, h: 52 };
    return { w: el.offsetWidth || 240, h: el.offsetHeight || 52 };
  }

  // ── 2. Build adjacency from connections ──
  const inDegree  = {};  // id → count of incoming edges
  const childrenOf = {}; // id → [child ids]
  nodes.forEach(n => { inDegree[n.id] = 0; childrenOf[n.id] = []; });
  connections.forEach(c => {
    if (inDegree[c.to] !== undefined)  inDegree[c.to]++;
    if (childrenOf[c.from])            childrenOf[c.from].push(c.to);
  });

  // ── 3. BFS from roots to assign levels ──
  const level = {};   // id → level index (0 = top)
  const levelNodes = []; // levelNodes[i] = [ids at level i]

  // Roots: nodes with no incoming connections
  const roots = nodes.filter(n => inDegree[n.id] === 0).map(n => n.id);
  // If no roots exist (cyclic graph), use all nodes as level 0
  const startSet = roots.length ? roots : nodes.map(n => n.id);

  const queue = [...startSet];
  startSet.forEach(id => { level[id] = 0; });

  while (queue.length) {
    const id = queue.shift();
    const lv = level[id];
    (childrenOf[id] || []).forEach(cid => {
      if (level[cid] === undefined || level[cid] < lv + 1) {
        level[cid] = lv + 1;
        queue.push(cid);
      }
    });
  }

  // Assign any unvisited nodes (disconnected) to a bottom orphan level
  const assignedMax = Math.max(0, ...Object.values(level));
  const orphanLevel = assignedMax + 1;
  nodes.forEach(n => {
    if (level[n.id] === undefined) level[n.id] = orphanLevel;
  });

  // Group nodes by level
  const maxLevel = Math.max(...nodes.map(n => level[n.id]));
  for (let i = 0; i <= maxLevel; i++) levelNodes[i] = [];
  nodes.forEach(n => levelNodes[level[n.id]].push(n.id));

  // ── 4. Compute row heights and widths ──
  // For each level, measure the total width needed
  const rowWidths = levelNodes.map(ids =>
    ids.reduce((sum, id) => sum + cardSize(id).w, 0) + Math.max(0, ids.length - 1) * GAP_X
  );
  const rowHeights = levelNodes.map(ids =>
    Math.max(...ids.map(id => cardSize(id).h), 52)
  );

  // Total canvas height
  const totalH = rowHeights.reduce((s, h) => s + h, 0) + Math.max(0, levelNodes.length - 1) * GAP_Y;
  const maxRowW = Math.max(...rowWidths, 1);

  // ── 5. Center of viewport in world coords ──
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  const cx = (vw / 2 - panX) / zoom;
  const cy = (vh / 2 - panY) / zoom;

  const startY = cy - totalH / 2;

  // ── 6. Place each level centered on cx, pyramid-style ──
  const placed = {}; // id → {x, y, w, h}
  let curY = startY;

  levelNodes.forEach((ids, li) => {
    const rw = rowWidths[li];
    let curX = cx - rw / 2;
    ids.forEach(id => {
      const { w, h } = cardSize(id);
      placed[id] = { x: curX, y: curY, w, h };
      curX += w + GAP_X;
    });
    curY += rowHeights[li] + GAP_Y;
  });

  // ── 7. Collision resolution (iterative push-apart) ──
  const MARGIN = 20;
  const allIds = nodes.map(n => n.id);

  for (let iter = 0; iter < 60; iter++) {
    let moved = false;
    for (let a = 0; a < allIds.length; a++) {
      for (let b = a + 1; b < allIds.length; b++) {
        const pa = placed[allIds[a]];
        const pb = placed[allIds[b]];
        if (!pa || !pb) continue;

        const overlapX = (pa.x + pa.w + MARGIN) - pb.x;
        const overlapY = (pa.y + pa.h + MARGIN) - pb.y;

        // Only resolve if actually overlapping on both axes
        if (overlapX > 0 && overlapY > 0 &&
            pb.x < pa.x + pa.w + MARGIN &&
            pb.y < pa.y + pa.h + MARGIN) {

          // Push along the smaller overlap axis
          if (overlapX < overlapY) {
            const push = overlapX / 2;
            pa.x -= push; pb.x += push;
          } else {
            const push = overlapY / 2;
            pa.y -= push; pb.y += push;
          }
          moved = true;
        }
      }
    }
    if (!moved) break;
  }

  // ── 8. Apply positions with smooth animation ──
  nodes.forEach(n => {
    const p = placed[n.id];
    if (!p) return;
    n.x = p.x; n.y = p.y;
    const el = document.getElementById(n.id);
    if (!el) return;
    el.style.transition = 'left 0.4s cubic-bezier(0.4,0,0.2,1), top 0.4s cubic-bezier(0.4,0,0.2,1)';
    el.style.left = p.x + 'px';
    el.style.top  = p.y + 'px';
    // Remove transition after animation completes
    setTimeout(() => { if (el) el.style.transition = ''; }, 450);
  });

  drawLinks(); drawMinimap();
  toast('PYRAMID LAYOUT APPLIED');
}

// ═══════════════════════════════════════════════
// MINIMAP
// ═══════════════════════════════════════════════
function drawMinimap() {
  const mw = mmCanvas.width, mh = mmCanvas.height;
  mmCtx.clearRect(0, 0, mw, mh);
  if (!nodes.length) return;

  const xs = nodes.map(n => n.x);
  const ys = nodes.map(n => n.y);
  const minX = Math.min(...xs) - 50, maxX = Math.max(...xs) + 300;
  const minY = Math.min(...ys) - 50, maxY = Math.max(...ys) + 200;
  const rangeX = maxX - minX || 1, rangeY = maxY - minY || 1;

  const toMM = (wx, wy) => ({
    x: ((wx - minX) / rangeX) * mw,
    y: ((wy - minY) / rangeY) * mh
  });

  // Draw links
  mmCtx.strokeStyle = 'rgba(0,255,65,0.3)';
  mmCtx.lineWidth = 0.5;
  connections.forEach(c => {
    const a = nodes.find(n => n.id === c.from);
    const b = nodes.find(n => n.id === c.to);
    if (!a || !b) return;
    const pa = toMM(a.x, a.y), pb = toMM(b.x, b.y);
    mmCtx.beginPath(); mmCtx.moveTo(pa.x, pa.y); mmCtx.lineTo(pb.x, pb.y); mmCtx.stroke();
  });

  // Draw nodes
  nodes.forEach(n => {
    const p = toMM(n.x, n.y);
    const colors = { red:'#ff2244', amber:'#ffaa00', blue:'#00aaff', purple:'#aa44ff' };
    mmCtx.fillStyle = colors[n.color] || '#00ff41';
    mmCtx.fillRect(p.x - 2, p.y - 2, 5, 3);
  });

  // Draw viewport rect
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  const tl = { x: -panX/zoom, y: -panY/zoom };
  const br = { x: tl.x + vw/zoom, y: tl.y + vh/zoom };
  const ptl = toMM(tl.x, tl.y), pbr = toMM(br.x, br.y);
  mmCtx.strokeStyle = 'rgba(0,255,65,0.6)';
  mmCtx.lineWidth = 1;
  mmCtx.strokeRect(ptl.x, ptl.y, pbr.x-ptl.x, pbr.y-ptl.y);
}

// Click minimap to navigate
mmCanvas.addEventListener('click', e => {
  if (!nodes.length) return;
  const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
  const minX = Math.min(...xs)-50, maxX = Math.max(...xs)+300;
  const minY = Math.min(...ys)-50, maxY = Math.max(...ys)+200;
  const rangeX = maxX - minX || 1, rangeY = maxY - minY || 1;
  const r = mmCanvas.getBoundingClientRect();
  const fx = (e.clientX - r.left) / mmCanvas.width;
  const fy = (e.clientY - r.top)  / mmCanvas.height;
  const wx = minX + fx * rangeX;
  const wy = minY + fy * rangeY;
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  panX = vw/2 - wx * zoom;
  panY = vh/2 - wy * zoom;
  applyTransform(); drawMinimap();
});

// ═══════════════════════════════════════════════
// .NDC EXPORT / IMPORT  (Nordica Canvas Format)
// ═══════════════════════════════════════════════
//
// .NDC file structure:
//   Bytes 0–8   : ASCII magic  "NORDICA1"  (8 bytes) + 0x0A newline
//   Bytes 9–end : gzip-compressed UTF-8 JSON payload
//
// JSON payload schema:
//   {
//     version   : "1.0",
//     created   : ISO timestamp,
//     meta      : { title, nodeCount, connectionCount, fileCount },
//     viewport  : { zoom, panX, panY },
//     nodes     : [ NodeRecord, … ],
//     connections: [ ConnectionRecord, … ],
//     files     : { [nodeId]: { fileType, fileData, content } }
//   }
//
// NodeRecord: { id, type, title, x, y, color }
// ConnectionRecord: { id, from, to, color }
// fileData is the original base64 data-URL (binary files) or null (text files)

const NDC_MAGIC = 'NORDICA1\n';

// ── Compression helpers ──
async function collectStream(readable) {
  const chunks = [];
  const reader = readable.getReader();
  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    if (value) chunks.push(value);
  }
  const total = chunks.reduce((n, c) => n + c.length, 0);
  const out = new Uint8Array(total);
  let offset = 0;
  for (const chunk of chunks) { out.set(chunk, offset); offset += chunk.length; }
  return out;
}

async function gzipString(str) {
  const cs = new CompressionStream('gzip');
  const writer = cs.writable.getWriter();
  writer.write(new TextEncoder().encode(str));
  writer.close();
  return collectStream(cs.readable);
}

async function gunzipBytes(bytes) {
  const ds = new DecompressionStream('gzip');
  const writer = ds.writable.getWriter();
  writer.write(bytes);
  writer.close();
  const out = await collectStream(ds.readable);
  return new TextDecoder().decode(out);
}

// ── Collect current textarea content ──
function collectNodeContent(id) {
  const el = document.getElementById(id);
  if (!el) return '';
  const ta = el.querySelector('textarea');
  return ta ? ta.value : '';
}

// ── Export ──
async function exportCanvas() {
  toast('PACKAGING CANVAS...');
  try {
    // Sync every node's x/y from actual DOM position (source of truth)
    nodes.forEach(n => {
      const el = document.getElementById(n.id);
      if (el) {
        n.x = parseFloat(el.style.left) || n.x;
        n.y = parseFloat(el.style.top)  || n.y;
      }
    });

    // Snapshot textarea values — only update fileStore if the node actually has a textarea
    // (text file nodes show a code-block, not a textarea, so don't overwrite their content)
    nodes.forEach(n => {
      const el = document.getElementById(n.id);
      const ta = el ? el.querySelector('textarea') : null;
      if (ta && fileStore[n.id]) {
        fileStore[n.id].content = ta.value;
      } else if (ta && !fileStore[n.id]) {
        // Plain note — content lives on textarea only, no fileStore entry
        // We'll collect it below via collectNodeContent
      }
    });

    const nodeCount       = nodes.length;
    const connectionCount = connections.length;
    const fileCount       = Object.keys(fileStore).length;

    const payload = {
      version: '1.0',
      created: new Date().toISOString(),
      meta: {
        title: 'Nordica Canvas',
        nodeCount, connectionCount, fileCount
      },
      viewport: { zoom, panX, panY },
      nodes: nodes.map(n => ({
        id:    n.id,
        type:  n.type,
        title: n.title,
        x:     Math.round(n.x),
        y:     Math.round(n.y),
        color: n.color || null,
        content: fileStore[n.id] ? '' : collectNodeContent(n.id)
      })),
      connections: connections.map(c => ({
        id:    c.id,
        from:  c.from,
        to:    c.to,
        color: c.color || null
      })),
      files: fileStore   // { [nid]: { fileType, fileData, content } }
    };

    const json      = JSON.stringify(payload);
    const compressed = await gzipString(json);

    // Prepend magic header as ASCII bytes
    const magic  = new TextEncoder().encode(NDC_MAGIC);
    const output = new Uint8Array(magic.length + compressed.length);
    output.set(magic, 0);
    output.set(compressed, magic.length);

    const blob  = new Blob([output], { type: 'application/octet-stream' });
    const ts    = new Date().toISOString().slice(0,19).replace(/[T:]/g,'-');
    const fname = `nordica-${ts}.ndc`;

    const a = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = fname;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);

    const kb = (output.length / 1024).toFixed(1);
    toast(`EXPORTED ${fname}  //  ${nodeCount} NODES  ${fileCount} FILES  ${kb} KB`);

  } catch (err) {
    console.error(err);
    toast('EXPORT FAILED: ' + err.message);
  }
}

// ── Import ──
function importCanvas() {
  const inp = document.createElement('input');
  inp.type   = 'file';
  inp.accept = '.ndc,.json';   // accept old .json too for backwards compat
  inp.onchange = async e => {
    const f = e.target.files[0];
    if (!f) return;
    toast('READING FILE...');
    try {
      const arrayBuf = await f.arrayBuffer();
      const bytes    = new Uint8Array(arrayBuf);

      let payload;

      // Check for NDC magic header
      const magic   = NDC_MAGIC;
      const magicBytes = new TextEncoder().encode(magic);
      const hasNDC  = bytes.slice(0, magicBytes.length).every((b, i) => b === magicBytes[i]);

      if (hasNDC) {
        // NDC format — decompress payload after magic
        const compressed = bytes.slice(magicBytes.length);
        const json        = await gunzipBytes(compressed);
        payload           = JSON.parse(json);
      } else {
        // Legacy .json fallback
        const text = new TextDecoder().decode(bytes);
        const legacy = JSON.parse(text);
        // Wrap legacy format into NDC schema
        payload = {
          version: '0.legacy',
          viewport: { zoom: legacy.zoom, panX: legacy.panX, panY: legacy.panY },
          nodes: legacy.nodes || [],
          connections: legacy.connections || [],
          files: {}
        };
      }

      // ── Validate ──
      if (!payload.nodes) throw new Error('Missing nodes array');

      // ── Clear existing canvas ──
      nodes.forEach(n => document.getElementById(n.id)?.remove());
      nodes = []; connections = []; selectedIds.clear();
      Object.keys(fileStore).forEach(k => delete fileStore[k]);

      // ── Restore viewport ──
      const vp = payload.viewport || {};
      zoom = vp.zoom || 1;
      panX = vp.panX || 0;
      panY = vp.panY || 0;
      applyTransform();

      // ── Restore file store first ──
      const files = payload.files || {};
      Object.assign(fileStore, files);

      // ── Restore nodes ──
      payload.nodes.forEach(n => {
        const fdata = fileStore[n.id] || {};
        createNode({
          id:       n.id,
          type:     n.type     || 'note',
          title:    n.title    || 'NODE',
          x:        n.x        || 100,
          y:        n.y        || 100,
          color:    n.color    || null,
          content:  n.content  || fdata.content || '',
          fileType: fdata.fileType || null,
          fileData: fdata.fileData || null
        });
      });

      // ── Restore connections ──
      connections = payload.connections || [];

      updateStatus(); drawLinks(); drawMinimap();

      const meta = payload.meta || {};
      toast(`IMPORTED  //  ${payload.nodes.length} NODES  ${Object.keys(files).length} FILES  v${payload.version || '?'}`);

    } catch (err) {
      console.error(err);
      toast('IMPORT FAILED: ' + err.message);
    }
  };
  inp.click();
}

// ═══════════════════════════════════════════════
// STATUS
// ═══════════════════════════════════════════════
function updateStatus() {
  document.getElementById('s-nodes').textContent = nodes.length;
  document.getElementById('s-links').textContent = connections.length;
  document.getElementById('s-sel').textContent   = selectedIds.size;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._to);
  t._to = setTimeout(() => t.style.opacity = '0', 2200);
}
